name: CI
on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  backend:
    name: Backend (vet, build, tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: homepad
          POSTGRES_PASSWORD: homepad
          POSTGRES_DB: homepad
        options: >-
          --health-cmd "pg_isready -U homepad -d homepad"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://homepad:homepad@postgres:5432/homepad?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go vet ./...
      - run: go build ./...
      # -p 1 serializes the integration package binaries (api + storage) so they
      # don't race on the shared Postgres (each package truncates the catalog).
      - run: go test ./... -count=1 -p 1

  build-and-push:
    name: Build & push image
    needs: backend
    # Only on a merge/push to main — not on PRs or feature branches.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Short commit SHA
        id: sha
        run: echo "short=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"
      - name: Registry login
        run: docker login dockerhub.calebdunn.tech -u ${{ secrets.REGISTRY_USERNAME }} -p ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build image
        run: docker build -t dockerhub.calebdunn.tech/homepad-api:${{ steps.sha.outputs.short }} -t dockerhub.calebdunn.tech/homepad-api:latest .
      - name: Push image
        run: |
          docker push dockerhub.calebdunn.tech/homepad-api:${{ steps.sha.outputs.short }}
          docker push dockerhub.calebdunn.tech/homepad-api:latest

